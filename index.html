<!DOCTYPE html>

<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Spline+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  :root { --bg:#f7efe2; --ink:#3a2414; --accent:#8b4513; --espresso:#5b3a1c; --cream:#f6ecdc;
          --card:#fffdf9; --line:#e3d3bd; --line2:#e6d6bf; --muted:#9c7a52; --sub:#7a5c3a; --body:#5a432d; --track:#e7d8c1; }
  * { box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:'Spline Sans',system-ui,sans-serif; }
  .font-display { font-family:'Fraunces',Georgia,serif; }
  .wrap { max-width:768px; margin:0 auto; padding:0 20px 80px; }

  nav.bar { position:sticky; top:0; z-index:20; display:flex; gap:8px; overflow-x:auto;
            margin:0 -20px 8px; padding:12px 20px; border-bottom:1px solid var(--line2);
            background:rgba(247,239,226,.92); backdrop-filter:blur(10px); }
  nav.bar button { white-space:nowrap; border:1px solid transparent; border-radius:999px; background:#efe2cf;
                   padding:7px 15px; font-size:14px; font-family:inherit; color:#6b4f30; cursor:pointer; transition:.18s; }
  nav.bar button:hover { background:#e5d4ba; }
  nav.bar button.active { background:var(--espresso); color:var(--cream); box-shadow:0 2px 10px rgba(91,58,28,.3); }

  header.hero { padding:48px 0; text-align:center; }
  .logo { width:64px; height:64px; margin:0 auto 16px; display:flex; align-items:center; justify-content:center;
          border-radius:18px; background:var(--espresso); color:var(--cream); box-shadow:0 10px 24px rgba(91,58,28,.25); }
  header.hero h1 { margin:0; font-size:60px; font-weight:900; line-height:.95; }
  header.hero h1 .it { font-style:italic; color:var(--accent); }
  header.hero p { max-width:440px; margin:16px auto 0; font-size:15px; line-height:1.6; color:var(--sub); }

  section { scroll-margin-top:80px; border-top:1px solid var(--line2); padding:40px 0; }
  .kicker { margin:0 0 4px; font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#b08a5a; }
  section h2 { margin:0 0 20px; font-size:34px; }

  .card { border:1px solid var(--line); background:var(--card); border-radius:24px; padding:24px; }
  .bigcard { box-shadow:0 4px 30px rgba(91,58,28,.07); }
  .row { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:14px; }
  .lbl { font-size:13px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; color:var(--muted); }

  .slider { -webkit-appearance:none; appearance:none; width:100%; height:8px; border-radius:999px;
            outline:none; cursor:pointer; }
  .slider::-webkit-slider-thumb { -webkit-appearance:none; appearance:none; width:26px; height:26px; border-radius:50%;
            background:var(--espresso); border:4px solid var(--cream); box-shadow:0 2px 8px rgba(91,58,28,.4); cursor:pointer; }
  .slider::-moz-range-thumb { width:26px; height:26px; border-radius:50%; background:var(--espresso);
            border:4px solid var(--cream); box-shadow:0 2px 8px rgba(91,58,28,.4); cursor:pointer; }

  .field { margin-bottom:20px; }
  .pills { display:flex; flex-wrap:wrap; gap:8px; }
  .pill { border:1.5px solid var(--line); border-radius:999px; padding:8px 16px; font-size:14px; font-weight:500;
          cursor:pointer; background:transparent; color:var(--sub); transition:.16s; font-family:inherit; }
  .pill:hover { border-color:var(--accent); color:var(--accent); }
  .pill.on { background:var(--espresso); border-color:var(--espresso); color:var(--cream); font-weight:600;
             box-shadow:0 3px 12px rgba(91,58,28,.28); transform:translateY(-1px); }
  .nota { margin-top:10px; font-size:13px; line-height:1.5; color:var(--sub); background:#f6ecda;
          border-left:3px solid var(--accent); border-radius:0 8px 8px 0; padding:8px 12px; }

  .stats { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
  @media(min-width:680px){ .stats{ grid-template-columns:repeat(4,1fr);} }
  .stat { border:1px solid var(--line); background:#fbf4e8; border-radius:16px; padding:16px; }
  .stat .top { display:flex; align-items:center; gap:8px; color:var(--muted);
               font-size:11px; letter-spacing:.14em; text-transform:uppercase; }
  .stat .val { margin-top:6px; font-family:'Fraunces',serif; font-size:30px; line-height:1; color:var(--ink); }
  .stat .val small { font-size:15px; color:var(--muted); margin-left:4px; }

  .tl { list-style:none; margin:0; padding:0; }
  .tl li { display:flex; gap:16px; margin-bottom:12px; }
  .tl .t { width:48px; flex:none; font-family:'Fraunces',serif; font-size:14px; font-weight:600; color:#b08a5a; }
  .tl .x { font-size:15px; color:var(--body); }

  .grid3 { display:grid; gap:12px; }
  @media(min-width:680px){ .grid3{ grid-template-columns:repeat(3,1fr);} }
  .grid2 { display:grid; gap:10px; }
  @media(min-width:680px){ .grid2{ grid-template-columns:repeat(2,1fr);} }

  table { width:100%; border-collapse:collapse; font-size:14px; }
  .tablewrap { overflow:hidden; border:1px solid var(--line); border-radius:16px; }
  thead { background:var(--espresso); color:var(--cream); }
  th,td { padding:12px; text-align:left; }
  tbody tr:nth-child(even){ background:#faf3e7; }

  .acc { overflow:hidden; border:1px solid var(--line); background:var(--card); border-radius:16px; margin-bottom:8px; }
  .acc button { display:flex; width:100%; align-items:center; justify-content:space-between; gap:12px;
                padding:16px; border:0; background:none; cursor:pointer; text-align:left; font-family:inherit; font-size:15px; color:var(--ink); }
  .acc .abody { border-top:1px solid #efe2cf; background:#faf3e7; padding:12px 16px; font-size:14px; color:var(--sub); }
  .chev { transition:transform .2s; flex:none; color:#b08a5a; }
  .chev.open { transform:rotate(180deg); }

  .sens-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .sens-lbl { width:90px; flex:none; font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); text-align:right; }
  .sens-track { flex:1; height:8px; background:var(--track); border-radius:999px; overflow:hidden; }
  .sens-fill { height:100%; border-radius:999px; transition:width .3s ease; }
  .sens-val { width:28px; flex:none; font-size:12px; font-weight:600; text-align:right; }
  .sca-badge { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:999px; font-size:13px; font-weight:600; }
  .sca-badge.gold { background:#e8f5e9; color:#2e7d32; border:1px solid #a5d6a7; }
  .sca-badge.under { background:#fff8e1; color:#f57f17; border:1px solid #ffe082; }
  .sca-badge.over { background:#fce4ec; color:#c62828; border:1px solid #ef9a9a; }
  .warn-item { display:flex; align-items:flex-start; gap:8px; padding:10px 14px; margin-top:8px;
               border-radius:12px; background:#fff8e1; border-left:3px solid #e65100; font-size:13px; color:#bf360c; line-height:1.5; }
  .hint { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-top:4px; }

  footer { margin-top:40px; border-top:1px solid var(--line2); padding-top:32px;
           text-align:center; font-size:12px; color:var(--muted); }
  footer .it { font-style:italic; }
</style>
</head>

const Coffee = I(<><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4Z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></>);

const Beaker = I(<><path d="M4.5 3h15"/><path d="M6 3v16a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V3"/><path d="M6 14h12"/></>);

const PROCESSES = {

  natural:{label:"Natural",dClick:1,dTemp:-2,ratio:16.6,nota:"Cereja seca inteira. Corpo cheio, doçura intensa, notas frutadas selvagens."},

  carbonica:{label:"Maceração carbônica",dClick:1,dTemp:-3,ratio:17.0,nota:"Cereja inteira fermentada em CO₂ (técnica do vinho). Muito aromático."},
  cofermento:{label:"Co-fermentado",dClick:2,dTemp:-3,ratio:17.0,nota:"Fermentado com frutas/leveduras adicionadas. Sabor extremo e divisivo."},
};
const ORIGINS = [
  ["Etiópia (washed)","Floral, cítrico, chá, corpo leve, acidez alta"],
  ["Etiópia (natural)","Mirtilo, morango, vinhoso, doçura tropical"],
  ["Quênia AA","Groselha negra, tomate, acidez fosfórica intensa"],

  ["Brasil","Chocolate, nozes, amendoim, baixa acidez, cremoso"],
  ["Costa Rica (honey)","Mel, frutas amarelas, doçura limpa"],
  ["Guatemala","Cacau, especiarias, frutas vermelhas, elegante"],
  ["Panamá Geisha","Floral exuberante, bergamota, jasmim, mel"],
  ["Indonésia","Terroso, especiarias, corpo cheio, defumado"],
];
const TROUBLE = [
  {s:"Drena rápido demais (<2:00) + azedo",d:"Moagem grossa demais",f:"2–3 cliques mais fino"},
  {s:"Drena lento demais (>4:00) + amargo",d:"Moagem fina demais / muitos finos",f:"2–3 cliques mais grosso, menos agitação"},

  {s:"Entope (stalling total)",d:"Excesso de finos",f:"Moagem mais grossa, troque o filtro"},
];
const SECTIONS = [["receita","Receita"],["simulador","Simulador"],["teoria","Teoria"],["moagem","Moagem"],["origens","Origens"],["problemas","Problemas"]];
const GRIND = [["Espresso","5–10","Fina"],["Moka pot","10–13","Média-fina"],["V60 (recomendado)","11–18","Média a média-fina"],["Chemex","18–24","Média-grossa"],["French Press","19–25","Grossa"]];
const THEORY = [
  ["Sub-extração","<18%","Azedo, salgado, raso, aguado","Moa mais fino, água mais quente, mais contato","#9d2b2b"],
  ["Golden Cup","18–22%","Doce, brilhante, final limpo e longo","Mantenha. Anote tudo e repita.","#2d6a4f"],

];

const PRESETS = {
  hoffmann:{label:"Hoffmann",dose:30,ratio:16.7,grind:14,temp:96,pours:2,dist:60,desc:"2 despejos, baixa agitação, corpo suave, alta clareza. Off-boil + Rao Spin."},
  kasuya:{label:"Kasuya 4:6",dose:20,ratio:15,grind:20,temp:93,pours:5,dist:40,desc:"5 pulsos, grind grosso, controle independente de acidez/doçura e força."},
  rao:{label:"Rao Spin",dose:20,ratio:16,grind:13,temp:96,pours:2,dist:60,desc:"Moagem fina, swirl agressivo, maximiza EY via extração uniforme."},
};

function estTime(grind,water,pours){
  const flow=190*Math.pow(14/grind,1.4)*Math.pow(water/300,0.3);
  const floor=(pours-1)*45+30;
  return Math.max(90,Math.min(420,Math.round(Math.max(flow,floor))));
}
function estEY(grind,temp,time,pours,ratio){
  let e=20;
  e+=(14-grind)*0.45;
  e+=(temp-96)*0.1;
  e+=Math.log(Math.max(90,time)/210)*2;
  e+=(pours-2)*0.3;
  e+=(ratio-16.7)*0.1;
  return Math.max(12,Math.min(28,e));
}
function calcSens(ey,tds,temp,grind,pours,time){
  const acidity=Math.max(0,Math.min(10,8-(ey-16)*0.5));
  const sweetness=Math.max(0,10*Math.exp(-Math.pow(ey-20.5,2)/12));
  const bitterness=Math.max(0,Math.min(10,(ey-18)*0.7));
  const body=Math.max(1,Math.min(10,tds*6));
  let ast=0;
  if(temp>96) ast+=(temp-96)*1.2;
  if(grind<12) ast+=(12-grind)*1;
  if(time>270) ast+=(time-270)/40;
  if(pours>3&&grind<14) ast+=1.5;
  return {acidity,sweetness,bitterness,body,astringency:Math.max(0,Math.min(10,ast))};
}
function scaZone(ey,tds){
  if(ey>=18&&ey<=22&&tds>=1.15&&tds<=1.35) return {c:"gold",l:"Golden Cup — zona ideal SCA"};
  if(ey<18) return {c:"under",l:"Sub-extração — abaixo de 18% EY"};
  if(ey>22) return {c:"over",l:"Super-extração — acima de 22% EY"};
  if(tds<1.15) return {c:"under",l:"Fraco — TDS abaixo de 1.15%"};
  return {c:"over",l:"Forte — TDS acima de 1.35%"};
}
function getWarns(grind,temp,time,pours,ey){
  const w=[];
  if(grind<=10) w.push("Moagem extremamente fina — alto risco de entupimento e channeling.");
  if(grind<13&&pours>3) w.push("Moagem fina + muitos despejos → migração severa de finos. Risco de stalling.");
  if(temp>96&&grind<13&&time>270) w.push("Temp alta + fina + tempo longo → risco de adstringência.");
  if(time>300) w.push("Tempo >5 min — retornos decrescentes, apenas compostos amargos restam.");
  if(ey<16) w.push("Extração muito baixa — moa mais fino ou aumente temperatura.");
  if(ey>24) w.push("Extração muito alta — moa mais grosso ou reduza temperatura.");
  return w;
}
function fmtSec(s){return Math.floor(s/60)+":"+String(Math.round(s%60)).padStart(2,"0");}
function genPours(dose,water,pours,dist,timeEst){
  const bl=dose*2, rem=water-bl, seq=[];
  seq.push({t:"0:00",d:"Bloom: "+bl+" g, swirl gentil"});
  if(pours<=1){
    seq.push({t:"0:45",d:"Despejo contínuo até "+water+" g em espiral"});
    seq.push({t:"~"+fmtSec(timeEst),d:"Drawdown completo — sirva"});
  } else {
    const fp=Math.round(rem*dist/100);
    let cum=bl, sec=45;
    cum+=fp;
    seq.push({t:fmtSec(sec),d:"Despejo 1: "+cum+" g ("+dist+"% pós-bloom)"});
    const restCount=pours-1;
    const rpp=Math.round((rem-fp)/restCount);
    for(let i=2;i<=pours;i++){
      sec+=35;
      const add=i===pours?(water-cum):rpp;
      cum=Math.min(cum+add,water);
      seq.push({t:fmtSec(sec),d:"Despejo "+i+": "+cum+" g"});
    }
    seq.push({t:"~"+fmtSec(timeEst),d:"Drawdown completo — sirva"});
  }
  return seq;
}

function Stat({icon:Icon,label,value,unit}){

    <div className="stat">
      <div className="top"><Icon size={15}/><span>{label}</span></div>
      <div className="val">{value}{unit && <small>{unit}</small>}</div>

}

function SensoryBar({label,value,color}){
  return (
    <div className="sens-row">
      <span className="sens-lbl">{label}</span>
      <div className="sens-track"><div className="sens-fill" style={{width:(value/10*100)+"%",background:color}}/></div>
      <span className="sens-val" style={{color}}>{value.toFixed(1)}</span>
    </div>
  );
}

function BrewChart({ey,tds}){
  const W=280,H=180,P=38;
  const eyR=[14,26],tR=[0.9,1.8];
  const sx=v=>P+(v-eyR[0])/(eyR[1]-eyR[0])*(W-2*P);
  const sy=v=>H-P-(v-tR[0])/(tR[1]-tR[0])*(H-2*P);
  const gx1=sx(18),gx2=sx(22),gy1=sy(1.35),gy2=sy(1.15);
  const cx=Math.max(P,Math.min(W-P,sx(ey)));
  const cy=Math.max(P,Math.min(H-P,sy(tds)));
  return (
    <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",maxWidth:300,display:"block",margin:"0 auto"}}>
      <rect x={gx1} y={gy1} width={gx2-gx1} height={gy2-gy1} fill="#e8f5e9" stroke="#a5d6a7" rx={4}/>
      <text x={(gx1+gx2)/2} y={(gy1+gy2)/2+3} textAnchor="middle" fill="#2e7d32" fontSize={9} fontWeight={600}>Golden Cup</text>
      <line x1={P} y1={H-P} x2={W-P} y2={H-P} stroke="#e3d3bd" strokeWidth={1}/>
      <line x1={P} y1={P} x2={P} y2={H-P} stroke="#e3d3bd" strokeWidth={1}/>
      {[16,18,20,22,24].map(v=><g key={v}><line x1={sx(v)} y1={H-P} x2={sx(v)} y2={H-P+4} stroke="#e3d3bd"/><text x={sx(v)} y={H-P+14} textAnchor="middle" fill="#9c7a52" fontSize={9}>{v}</text></g>)}
      {[1.0,1.15,1.35,1.6].map(v=><g key={v}><line x1={P-4} y1={sy(v)} x2={P} y2={sy(v)} stroke="#e3d3bd"/><text x={P-6} y={sy(v)+3} textAnchor="end" fill="#9c7a52" fontSize={9}>{v.toFixed(1)}</text></g>)}
      <text x={W/2} y={H-4} textAnchor="middle" fill="#9c7a52" fontSize={9} fontWeight={500}>EY %</text>
      <text x={10} y={H/2} textAnchor="middle" fill="#9c7a52" fontSize={9} fontWeight={500} transform={"rotate(-90,10,"+(H/2)+")"}>TDS %</text>
      <circle cx={cx} cy={cy} r={7} fill="#5b3a1c" stroke="#f6ecdc" strokeWidth={2.5}/>
    </svg>
  );
}

function App(){
  const [dose,setDose] = useState(15);
  const [roast,setRoast] = useState("media");
  const [process,setProcess] = useState("washed");
  const [openT,setOpenT] = useState(null);
  const [active,setActive] = useState("receita");
  const r = ROASTS[roast], pr = PROCESSES[process];

  const rec = useMemo(()=>{
    const clicks = Math.max(6, r.clicks + pr.dClick);
    const temp = r.temp + pr.dTemp;
    const water = Math.round(dose * pr.ratio);
    return { clicks, temp, ratio:pr.ratio, water, bloom:dose*2, firstPour:Math.round(water*0.6) };
  },[dose,r,pr]);

  useEffect(()=>{
    const obs = new IntersectionObserver((entries)=>{
      entries.forEach(e=>{ if(e.isIntersecting) setActive(e.target.id); });
    },{ rootMargin:"-45% 0px -50% 0px" });
    SECTIONS.forEach(([id])=>{ const el=document.getElementById(id); if(el) obs.observe(el); });
    return ()=>obs.disconnect();
  },[]);

  const go = (id)=>{ const el=document.getElementById(id); if(el) el.scrollIntoView({behavior:"smooth",block:"start"}); };

  const pct = ((dose-10)/(30-10))*100;
  const sliderBg = { background:"linear-gradient(to right, var(--accent) "+pct+"%, var(--track) "+pct+"%)" };

  // Simulator state
  const [sPreset,setSPreset] = useState("hoffmann");
  const [sD,setSD] = useState(30);
  const [sR,setSR] = useState(16.7);
  const [sG,setSG] = useState(14);
  const [sT,setST] = useState(96);
  const [sP,setSP] = useState(2);
  const [sDist,setSDist] = useState(60);

  const applyPreset=(k)=>{const ps=PRESETS[k];setSPreset(k);setSD(ps.dose);setSR(ps.ratio);setSG(ps.grind);setST(ps.temp);setSP(ps.pours);setSDist(ps.dist);};
  const simW=Math.round(sD*sR);
  const simTime=estTime(sG,simW,sP);
  const simEY=estEY(sG,sT,simTime,sP,sR);
  const simTDS=simW>2*sD?(simEY/100*sD)/(simW-2*sD)*100:0;
  const simSens=calcSens(simEY,simTDS,sT,sG,sP,simTime);
  const simSCA=scaZone(simEY,simTDS);
  const simWarns=getWarns(sG,sT,simTime,sP,simEY);
  const simSeq=genPours(sD,simW,sP,sDist,simTime);
  const mkBg=(min,max,val)=>{const p=((val-min)/(max-min))*100;return{background:"linear-gradient(to right, var(--accent) "+p+"%, var(--track) "+p+"%)"};};

  return (
    <div className="wrap">
      <nav className="bar">
        {SECTIONS.map(([id,l])=>
          <button key={id} className={active===id?"active":""} onClick={()=>go(id)}>{l}</button>)}
      </nav>

      <header className="hero">
        <div className="logo"><Coffee size={30} sw={1.8}/></div>
        <h1 className="font-display">Cookbook<br/><span className="it">V60</span></h1>
        <p>Um método base sólido e suas variações por torra, processo e grão — calibrado para o Timemore C3S Pro.</p>
      </header>

      <section id="receita">
        <p className="kicker font-display">Método base + variações</p>
        <h2 className="font-display">Calculadora</h2>

        <div className="card bigcard">
          <div className="field">
            <div className="row"><span className="lbl">Dose de café</span>
              <span className="font-display" style={{fontSize:26}}>{dose} g</span></div>
            <input className="slider" type="range" min={10} max={30} step={1} value={dose}
                   style={sliderBg} onChange={e=>setDose(+e.target.value)}/>
          </div>

          <div className="field">
            <p className="lbl" style={{marginBottom:10}}>Torra</p>
            <div className="pills">
              {Object.entries(ROASTS).map(([k,v])=>
                <button key={k} className={"pill"+(roast===k?" on":"")} onClick={()=>setRoast(k)}>{v.label}</button>)}
            </div>
          </div>

          <div className="field">
            <p className="lbl" style={{marginBottom:10}}>Processo do grão</p>
            <div className="pills">
              {Object.entries(PROCESSES).map(([k,v])=>
                <button key={k} className={"pill"+(process===k?" on":"")} onClick={()=>setProcess(k)}>{v.label}</button>)}
            </div>
            <p className="nota">{pr.nota}</p>
          </div>

          <div className="stats">
            <Stat icon={Droplet} label="Água" value={rec.water} unit="g"/>
            <Stat icon={Gear} label="Moagem" value={rec.clicks} unit="cliques"/>
            <Stat icon={Thermo} label="Temp." value={rec.temp} unit="°C"/>
            <Stat icon={Beaker} label="Proporção" value={"1:"+rec.ratio} unit=""/>
          </div>
        </div>

        <div className="card" style={{marginTop:24}}>
          <div style={{display:"flex",alignItems:"center",gap:8,color:"var(--accent)",marginBottom:16}}>
            <Timer size={18}/><span className="font-display" style={{fontSize:18}}>Sequência de despejos</span>
          </div>
          <ol className="tl">
            {[["0:00","Bloom: despeje "+rec.bloom+" g de água, swirl gentil"],
              ["0:45","Despejo 1: complete até "+rec.firstPour+" g (60%) em espiral"],
              ["1:15","Despejo 2: complete até "+rec.water+" g"],
              ["1:50","Swirl final para nivelar a cama"],
              ["~3:00","Drawdown completo — sirva"]].map(([t,x],i)=>
              <li key={i}><span className="t">{t}</span><span className="x">{x}</span></li>)}
          </ol>
        </div>
      </section>

      <section id="simulador">
        <p className="kicker font-display">Laboratório</p>
        <h2 className="font-display">Simulador de extração</h2>

        <div style={{marginBottom:20}}>
          <p className="lbl" style={{marginBottom:10}}>Método base</p>
          <div className="pills">
            {Object.entries(PRESETS).map(([k,v])=>
              <button key={k} className={"pill"+(sPreset===k?" on":"")} onClick={()=>applyPreset(k)}>{v.label}</button>)}
          </div>
          {sPreset && <p className="nota">{PRESETS[sPreset].desc}</p>}
          {!sPreset && <p className="nota">Configuração personalizada — ajuste os controles abaixo.</p>}
        </div>

        <div className="card bigcard">
          <div className="field">
            <div className="row"><span className="lbl">Dose</span><span className="font-display" style={{fontSize:22}}>{sD} g</span></div>
            <input className="slider" type="range" min={10} max={30} step={1} value={sD}
                   style={mkBg(10,30,sD)} onChange={e=>{setSD(+e.target.value);setSPreset(null);}}/>
          </div>

          <div className="field">
            <div className="row"><span className="lbl">Proporção</span><span className="font-display" style={{fontSize:22}}>1:{sR.toFixed(1)}</span></div>
            <input className="slider" type="range" min={14} max={18} step={0.1} value={sR}
                   style={mkBg(14,18,sR)} onChange={e=>{setSR(+(+e.target.value).toFixed(1));setSPreset(null);}}/>
            <div className="hint"><span>← Forte (TDS alto)</span><span>Leve (TDS baixo) →</span></div>
          </div>

          <div className="field">
            <div className="row"><span className="lbl">Moagem</span><span className="font-display" style={{fontSize:22}}>{sG} cliques</span></div>
            <input className="slider" type="range" min={8} max={24} step={1} value={sG}
                   style={mkBg(8,24,sG)} onChange={e=>{setSG(+e.target.value);setSPreset(null);}}/>
            <div className="hint"><span>← Fino (mais extração)</span><span>Grosso (menos extração) →</span></div>
          </div>

          <div className="field">
            <div className="row"><span className="lbl">Temperatura</span><span className="font-display" style={{fontSize:22}}>{sT} °C</span></div>
            <input className="slider" type="range" min={80} max={100} step={1} value={sT}
                   style={mkBg(80,100,sT)} onChange={e=>{setST(+e.target.value);setSPreset(null);}}/>
            <div className="hint"><span>← Frio (menos extração)</span><span>Quente (mais extração) →</span></div>
          </div>

          <div className="field">
            <div className="row"><span className="lbl">Nº de despejos</span><span className="font-display" style={{fontSize:22}}>{sP}</span></div>
            <div className="pills">
              {[1,2,3,4,5].map(n=>
                <button key={n} className={"pill"+(sP===n?" on":"")} onClick={()=>{setSP(n);setSPreset(null);}}>{n}</button>)}
            </div>
          </div>

          {sP>1 && <div className="field">
            <div className="row"><span className="lbl">Distribuição frontal</span><span className="font-display" style={{fontSize:22}}>{sDist}%</span></div>
            <input className="slider" type="range" min={30} max={70} step={5} value={sDist}
                   style={mkBg(30,70,sDist)} onChange={e=>{setSDist(+e.target.value);setSPreset(null);}}/>
            <div className="hint"><span>← Mais ácido (pouco no 1º)</span><span>Mais doce (muito no 1º) →</span></div>
          </div>}
        </div>

        <div style={{marginTop:24}}>
          <div className="stats">
            <Stat icon={Beaker} label="Extração" value={simEY.toFixed(1)} unit="%"/>
            <Stat icon={Droplet} label="TDS" value={simTDS.toFixed(2)} unit="%"/>
            <Stat icon={Timer} label="Tempo est." value={fmtSec(simTime)} unit=""/>
            <Stat icon={Droplet} label="Água" value={simW} unit="g"/>
          </div>
          <div style={{marginTop:16}}>
            <span className={"sca-badge "+simSCA.c}>{simSCA.l}</span>
          </div>
        </div>

        <div className="grid2" style={{marginTop:20}}>
          <div className="card" style={{padding:20}}>
            <p className="lbl" style={{marginBottom:12}}>Brewing Control Chart</p>
            <BrewChart ey={simEY} tds={simTDS}/>
            <p style={{fontSize:11,color:"var(--muted)",textAlign:"center",marginTop:8}}>Ponto = sua receita · Zona verde = SCA Golden Cup</p>
          </div>
          <div className="card" style={{padding:20}}>
            <p className="lbl" style={{marginBottom:12}}>Perfil sensorial estimado</p>
            <SensoryBar label="Acidez" value={simSens.acidity} color="#d4a017"/>
            <SensoryBar label="Doçura" value={simSens.sweetness} color="#2e7d32"/>
            <SensoryBar label="Amargor" value={simSens.bitterness} color="#8b4513"/>
            <SensoryBar label="Corpo" value={simSens.body} color="#5b3a1c"/>
            <SensoryBar label="Adstring." value={simSens.astringency} color="#9d2b2b"/>
            <p style={{fontSize:11,color:"var(--muted)",marginTop:8}}>Modelo heurístico baseado em dados de Rao, Gagné e Barista Hustle. Use um refratômetro para medições reais.</p>
          </div>
        </div>

        {simWarns.length>0 && <div style={{marginTop:16}}>
          {simWarns.map((w,i)=>
            <div key={i} className="warn-item"><span style={{flexShrink:0,marginTop:1}}><Alert size={15}/></span><span>{w}</span></div>)}
        </div>}

        <div className="card" style={{marginTop:20}}>
          <div style={{display:"flex",alignItems:"center",gap:8,color:"var(--accent)",marginBottom:16}}>
            <Timer size={18}/><span className="font-display" style={{fontSize:18}}>Sequência de despejos</span>
          </div>
          <ol className="tl">
            {simSeq.map((s,i)=>
              <li key={i}><span className="t">{s.t}</span><span className="x">{s.d}</span></li>)}
          </ol>
        </div>
      </section>

      <section id="teoria">
        <p className="kicker font-display">Fundamentos</p>
        <h2 className="font-display">Extração em uma página</h2>
        <div className="grid3">
          {THEORY.map(([t,range,sinal,fix,c])=>
            <div key={t} className="card" style={{padding:20}}>
              <div className="font-display" style={{fontSize:18,color:c}}>{t}</div>
              <div style={{fontSize:14,fontWeight:600,color:"var(--muted)",marginBottom:8}}>{range}</div>
              <p style={{fontSize:14,color:"var(--body)",margin:"0 0 8px"}}>{sinal}</p>
              <p style={{fontSize:12,fontStyle:"italic",color:"var(--muted)",margin:0}}>{fix}</p>
            </div>)}
        </div>
        <p style={{fontSize:15,lineHeight:1.6,color:"var(--body)",marginTop:20}}>
          O padrão SCA "Golden Cup": força (TDS) de 1,15–1,35% a partir de uma extração de 18–22%, água a 93 °C ±3 °C.
          As maiores alavancas, em ordem: <strong>moagem → proporção → temperatura → agitação → tempo</strong>.
        </p>
      </section>

      <section id="moagem">
        <p className="kicker font-display">Timemore C3S Pro</p>
        <h2 className="font-display">Moagem em cliques</h2>
        <div className="tablewrap">
          <table>
            <thead><tr><th>Método</th><th>Cliques</th><th>Granulometria</th></tr></thead>
            <tbody>
              {GRIND.map(([m,c,g])=>
                <tr key={m}>
                  <td style={m.includes("V60")?{fontWeight:600,color:"var(--accent)"}:{color:"var(--body)"}}>{m}</td>
                  <td style={{color:"var(--body)"}}>{c}</td>
                  <td style={{color:"var(--muted)"}}>{g}</td>
                </tr>)}
            </tbody>
          </table>
        </div>
        <p style={{fontSize:15,lineHeight:1.6,color:"var(--body)",marginTop:16}}>
          83 µm por clique · 12 cliques por volta · mós S2C660 de 38 mm em aço inox.
          Ponto de partida universal: <strong>14 cliques</strong>. Mais clara/densa → mais fino; mais escura → mais grossa.
        </p>
      </section>

      <section id="origens">
        <p className="kicker font-display">Sensorial</p>
        <h2 className="font-display">Perfis por origem</h2>
        <div className="grid2">
          {ORIGINS.map(([o,n])=>
            <div key={o} className="card" style={{padding:16,borderRadius:12}}>
              <div className="font-display" style={{fontSize:16}}>{o}</div>
              <p style={{fontSize:14,color:"var(--sub)",margin:"2px 0 0"}}>{n}</p>
            </div>)}
        </div>
      </section>

      <section id="problemas">
        <p className="kicker font-display">Diagnóstico</p>
        <h2 className="font-display">Resolvendo problemas</h2>
        {TROUBLE.map((t,i)=>
          <div key={i} className="acc">
            <button onClick={()=>setOpenT(openT===i?null:i)}>
              <span style={{display:"flex",alignItems:"center",gap:10}}>
                <Alert size={16}/>{t.s}
              </span>
              <Chev size={18} className={"chev"+(openT===i?" open":"")}/>
            </button>
            {openT===i &&
              <div className="abody">
                <p style={{margin:0}}><strong style={{color:"var(--body)"}}>Causa:</strong> {t.d}</p>
                <p style={{margin:"4px 0 0"}}><strong style={{color:"var(--body)"}}>Solução:</strong> {t.f}</p>
              </div>}
          </div>)}
      </section>

      <footer>
        ☕ Cookbook V60 · 2026 · Calibrado para Timemore C3S Pro<br/>
        <span className="it">Comece pelo método base. Prove com atenção. Ajuste uma variável por vez.</span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
